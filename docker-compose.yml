version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: code-editor-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - CLIENT_URL=http://localhost:3000
    networks:
      - code-editor-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: code-editor-client
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_SERVER_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - code-editor-network

networks:
  code-editor-network:
    driver: bridge
